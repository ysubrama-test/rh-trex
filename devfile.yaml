schemaVersion: 2.2.0
metadata:
  name: trex
  attributes:
    alpha.dockerimage-port: 8000
  version: 1.0.0
  provider: Red Hat  
components:
  - name: container-build
    image:
      imageName: trex
      dockerfile:
        uri:  Containerfile.rhtap
        buildContext:  .
        rootRequired: false 
  - name: trex-deploy
    kubernetes:
      uri: trex.yaml
      endpoints:
      - name: frontend-port
        targetPort: 8000
        path: /
  - name: pg-deploy
    kubernetes:
      uri: pg.yaml
      endpoints:
      - name: pg-port
        targetPort: 5432
commands:
  - id: build-image
    apply:
      component: container-build
  - id: deploytrex
    apply:
      component: trex-deploy
  - id: deploypg
    apply:
      component: pg-deploy        
  - id: deploy
    composite:
      commands:
        - build-image
        - deploytrex
        - deploypg
      group:
        kind: deploy
        isDefault: true
